apiVersion: apps/v1
kind: Deployment
metadata:
  name: html-deploy
spec:
  replicas: 2
  selector:
    matchLabels:
      app: htmlapp
  template:
    metadata:
      labels:
        app: htmlapp
    spec:
      containers:
      - name: html-container
        image: my-nginx-image:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 80